<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Portfolio - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: 100vh;
            background: #2c3e50;
        }
        .sidebar .nav-link {
            color: #ecf0f1;
            padding: 1rem 1.5rem;
            border-radius: 0;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: #34495e;
            color: #fff;
        }
        .main-content {
            min-height: 100vh;
            background: #f8f9fa;
        }
        .artwork-card {
            transition: transform 0.2s;
        }
        .artwork-card:hover {
            transform: translateY(-5px);
        }
        .artwork-image {
            height: 200px;
            object-fit: cover;
        }
        .login-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        .image-preview {
            max-width: 200px;
            max-height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container d-flex align-items-center justify-content-center">
        <div class="card login-card" style="width: 400px;">
            <div class="card-body p-5">
                <h2 class="text-center text-white mb-4">Artist Admin Panel</h2>
                <form id="loginForm">
                    <div class="mb-3">
                        <input type="email" class="form-control" id="loginEmail" placeholder="Email" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" class="form-control" id="loginPassword" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn btn-light w-100">Login</button>
                </form>
                <div id="loginError" class="alert alert-danger mt-3" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminDashboard" style="display: none;">
        <div class="container-fluid">
            <div class="row">
                <!-- Sidebar -->
                <div class="col-md-3 col-lg-2 sidebar">
                    <div class="p-3">
                        <h4 class="text-white">Admin Panel</h4>
                        <p class="text-muted small" id="artistName">Welcome</p>
                    </div>
                    <nav class="nav flex-column">
                        <a class="nav-link active" href="#" data-section="dashboard">
                            <i class="bi bi-house-door me-2"></i> Dashboard
                        </a>
                        <a class="nav-link" href="#" data-section="artworks">
                            <i class="bi bi-palette me-2"></i> My Artworks
                        </a>
                        <a class="nav-link" href="#" data-section="add-artwork">
                            <i class="bi bi-plus-circle me-2"></i> Add Artwork
                        </a>
                        <a class="nav-link" href="#" data-section="profile">
                            <i class="bi bi-person me-2"></i> Profile
                        </a>
                        <a class="nav-link" href="#" id="logoutBtn">
                            <i class="bi bi-box-arrow-right me-2"></i> Logout
                        </a>
                    </nav>
                </div>

                <!-- Main Content -->
                <div class="col-md-9 col-lg-10 main-content">
                    <!-- Dashboard Section -->
                    <div id="dashboard" class="section active p-4">
                        <h2>Dashboard</h2>
                        <div class="row">
                            <div class="col-md-3">
                                <div class="card bg-primary text-white">
                                    <div class="card-body">
                                        <h5>Total Artworks</h5>
                                        <h2 id="totalArtworks">0</h2>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card bg-success text-white">
                                    <div class="card-body">
                                        <h5>Published</h5>
                                        <h2 id="publishedArtworks">0</h2>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card bg-warning text-white">
                                    <div class="card-body">
                                        <h5>Drafts</h5>
                                        <h2 id="draftArtworks">0</h2>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card bg-info text-white">
                                    <div class="card-body">
                                        <h5>Total Views</h5>
                                        <h2 id="totalViews">0</h2>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Artworks Section -->
                    <div id="artworks" class="section p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h2>My Artworks</h2>
                            <button class="btn btn-primary" data-section="add-artwork">Add New Artwork</button>
                        </div>
                        <div id="artworksList" class="row">
                            <!-- Artworks will be loaded here -->
                        </div>
                    </div>

                    <!-- Add Artwork Section -->
                    <div id="add-artwork" class="section p-4">
                        <h2 id="artworkFormTitle">Add New Artwork</h2>
                        <form id="artworkForm" enctype="multipart/form-data">
                            <input type="hidden" id="artworkId">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">Title *</label>
                                        <input type="text" class="form-control" id="artworkTitle" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Category *</label>
                                        <select class="form-control" id="artworkCategory" required>
                                            <option value="painting">Painting</option>
                                            <option value="drawing">Drawing</option>
                                            <option value="sculpture">Sculpture</option>
                                            <option value="photography">Photography</option>
                                            <option value="printmaking">Printmaking</option>
                                            <option value="mixed-media">Mixed Media</option>
                                            <option value="other">Other</option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Medium *</label>
                                        <input type="text" class="form-control" id="artworkMedium" placeholder="e.g., Oil on canvas" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Dimensions</label>
                                        <input type="text" class="form-control" id="artworkDimensions" placeholder="e.g., 100CM x 80CM">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Year</label>
                                        <input type="text" class="form-control" id="artworkYear" placeholder="e.g., 2024">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">Image *</label>
                                        <input type="file" class="form-control" id="artworkImage" accept="image/*">
                                        <div id="imagePreview" class="mt-2"></div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Description</label>
                                        <textarea class="form-control" id="artworkDescription" rows="4"></textarea>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Tags (comma separated)</label>
                                        <input type="text" class="form-control" id="artworkTags" placeholder="abstract, colorful, modern">
                                    </div>
                                    <div class="mb-3">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="artworkPublished" checked>
                                            <label class="form-check-label">Published</label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="artworkFeatured">
                                            <label class="form-check-label">Featured</label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success">Save Artwork</button>
                            <button type="button" class="btn btn-secondary" id="cancelEdit">Cancel</button>
                        </form>
                    </div>

                    <!-- Profile Section -->
                    <div id="profile" class="section p-4">
                        <h2>Profile Settings</h2>
                        <form id="profileForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">Name</label>
                                        <input type="text" class="form-control" id="profileName">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Email</label>
                                        <input type="email" class="form-control" id="profileEmail" readonly>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Phone</label>
                                        <input type="text" class="form-control" id="profilePhone">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Location</label>
                                        <input type="text" class="form-control" id="profileLocation">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">Bio</label>
                                        <textarea class="form-control" id="profileBio" rows="4"></textarea>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Instagram</label>
                                        <input type="text" class="form-control" id="profileInstagram">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Facebook</label>
                                        <input type="text" class="form-control" id="profileFacebook">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Twitter</label>
                                        <input type="text" class="form-control" id="profileTwitter">
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary">Update Profile</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
</body>
</html>
